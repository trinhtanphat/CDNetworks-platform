name: Deploy to VPS

# Deploy bằng SSH tới VPS production. Cần set secrets:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_DEPLOY_PATH (vd: /root/CDNetworks-platform)
on:
  workflow_run:
    workflows: ['Docker Build & Push']
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.deploy.yml --env-file .env pull || true
            docker compose -f docker-compose.deploy.yml --env-file .env up -d --build
            docker exec xiaozhi-esp32-server-web nginx -t \
              && docker exec xiaozhi-esp32-server-web nginx -s reload
            docker compose -f docker-compose.deploy.yml ps
