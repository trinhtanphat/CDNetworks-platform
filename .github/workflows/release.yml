name: Release Container Images

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag để build (vd: v0.1.0)'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write   # cosign keyless

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/cdnetworks-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dockerfile: infrastructure/docker/web.Dockerfile
          - app: console
            dockerfile: infrastructure/docker/console.Dockerfile
          - app: api
            dockerfile: infrastructure/docker/api.Dockerfile
          - app: docs
            dockerfile: infrastructure/docker/docs.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.app }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.app }}

      # SBOM + cosign keyless signing
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'); do
            cosign sign --yes "$tag"
          done
