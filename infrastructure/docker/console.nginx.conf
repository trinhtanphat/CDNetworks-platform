# Cấu hình nginx nội bộ cho container Console (SPA).
# History API fallback → mọi route trả index.html.
server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Asset hashed → cache lâu
  location ~* \.(?:js|css|woff2?|png|jpg|svg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /healthz { return 200 "ok"; default_type text/plain; }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  gzip on; gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
