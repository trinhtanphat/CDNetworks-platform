# =============================================================================
# Alertmanager → Telegram + Slack route.
# Apply: kubectl -n monitoring create configmap alertmanager-config \
#          --from-file=alertmanager.yml --dry-run=client -o yaml | kubectl apply -f -
# =============================================================================
global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/CHANGEME'

route:
  receiver: default-slack
  group_by: [alertname, cluster, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="critical"]
      receiver: telegram-critical
      continue: true
    - matchers: [alertname=~"Edge.*|Origin.*"]
      receiver: telegram-edge

receivers:
  - name: default-slack
    slack_configs:
      - channel: '#cdn-alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }} — {{ .Status | toUpper }}'
        text: |
          {{ range .Alerts }}*{{ .Labels.severity }}* {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  - name: telegram-critical
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_token
        chat_id: -1001234567890
        parse_mode: HTML
        send_resolved: true
        message: |
          🚨 <b>{{ .CommonLabels.alertname }}</b> ({{ .CommonLabels.severity }})
          {{ range .Alerts }}{{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  - name: telegram-edge
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_token
        chat_id: -1009876543210
        parse_mode: HTML
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity=~"warning|info"]
    equal: [alertname, cluster]
