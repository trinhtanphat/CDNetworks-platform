# ============================================================================
# REST API (apps/api) on internal port 4000.
# Subdomain: api.cdnetworks-platform.local
# ============================================================================

upstream cdn_api_upstream {
  server api:4000;
  keepalive 64;
}

# Rate limit zone (300 req/min per IP) — relaxed for authenticated traffic via API key
limit_req_zone $binary_remote_addr zone=cdn_api_rl:10m rate=300r/m;

server {
  listen       80;
  listen  [::]:80;
  server_name  api.cdnetworks-platform.local;

  if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

  # CORS — chỉ cho phép subdomain console + web cùng platform
  set $cors_origin "";
  if ($http_origin ~* "^https://(console|www|cdnetworks-platform)\.cdnetworks-platform\.local$") {
    set $cors_origin $http_origin;
  }
  add_header Access-Control-Allow-Origin      $cors_origin always;
  add_header Access-Control-Allow-Credentials true        always;
  add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
  add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Api-Key, X-Requested-With" always;
  add_header Access-Control-Max-Age           86400 always;

  if ($request_method = OPTIONS) { return 204; }

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;

  # /health bypass rate-limit — phục vụ probe
  location = /health {
    proxy_pass http://cdn_api_upstream;
    access_log off;
  }

  location /api/ {
    limit_req zone=cdn_api_rl burst=60 nodelay;
    proxy_pass http://cdn_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # SSE / long-poll friendly
    proxy_buffering off;
    proxy_cache off;
  }

  location / { return 404 '{"error":"Not Found"}'; default_type application/json; }

  client_max_body_size 5m;
}
