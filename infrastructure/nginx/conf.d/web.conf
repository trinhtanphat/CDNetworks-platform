# ============================================================================
# Marketing site — Next.js (apps/web) on port 3001 internally.
# Domain: cdnetworks.vnso.vn (www optional)
# ============================================================================

upstream cdn_web_upstream {
  server web:3000;
  keepalive 32;
}

server {
  listen       80;
  listen  [::]:80;
  server_name  cdnetworks.vnso.vn www.cdnetworks.vnso.vn;

  # Force HTTPS (in production, Cloudflare/edge provides TLS termination)
  if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://console-cdnetworks.vnso.vn; font-src 'self' data:; frame-ancestors 'self';" always;

  # Static asset caching (Next.js _next/static is hashed → can cache forever)
  location /_next/static/ {
    proxy_pass http://cdn_web_upstream;
    proxy_cache_valid 200 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    proxy_pass http://cdn_web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }

  client_max_body_size 5m;
  gzip on; gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
