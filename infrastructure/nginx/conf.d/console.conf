# ============================================================================
# Console SPA (apps/console) — static SPA served by nginx inside container,
# but this vhost reverse-proxies to the dedicated console nginx.
# ============================================================================

upstream cdn_console_upstream {
  server console:80;
  keepalive 32;
}

server {
  listen       80;
  listen  [::]:80;
  server_name  console.cdnetworks-platform.local;

  if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.cdnetworks-platform.local; font-src 'self' data:; frame-ancestors 'none';" always;

  # /api/* → API service (CORS-free same-origin)
  location /api/ {
    proxy_pass http://cdn_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location / {
    proxy_pass http://cdn_console_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  client_max_body_size 10m;
  gzip on; gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
