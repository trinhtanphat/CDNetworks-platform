# ============================================================================
# Docs legacy vhost. Production docs are embedded at https://cdnetworks.vnso.vn/document/.
# ============================================================================

upstream cdn_docs_upstream {
  server docs:80;
  keepalive 16;
}

server {
  listen       80;
  listen  [::]:80;
  server_name  docs-cdnetworks.vnso.vn;

  if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  location / { return 301 https://cdnetworks.vnso.vn/document$request_uri; }

  gzip on; gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
