# ============================================================================
# Docs site (Docusaurus build) — static, served by docs container.
# Subdomain: docs.cdnetworks-platform.local
# ============================================================================

upstream cdn_docs_upstream {
  server docs:80;
  keepalive 16;
}

server {
  listen       80;
  listen  [::]:80;
  server_name  docs.cdnetworks-platform.local;

  if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  location / {
    proxy_pass http://cdn_docs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  gzip on; gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
