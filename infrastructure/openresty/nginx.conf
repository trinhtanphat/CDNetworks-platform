# =============================================================================
# OpenResty Edge — CDNetworks-style data plane.
# Tính năng:
#   - Dynamic SSL (load cert từ Redis theo SNI)
#   - WAF + Distributed Rate Limit (Redis counter)
#   - Edge cache (proxy_cache)
#   - Cache Purge worker (Redis Pub/Sub)
#   - Access log JSON → Kafka (qua Vector/FluentBit ngoài)
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 200000;
events { worker_connections 65535; multi_accept on; use epoll; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 75s;
    keepalive_requests 1000;
    server_tokens off;

    # ============================ Lua paths =================================
    lua_package_path "/etc/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_shared_dict cert_cache    50m;
    lua_shared_dict rate_limit    50m;
    lua_shared_dict waf_blocklist 20m;

    # Init worker → start cache-purge subscriber.
    init_worker_by_lua_block {
        local ok, err = pcall(function()
            require("purge_worker").start()
        end)
        if not ok then ngx.log(ngx.ERR, "purge_worker init: ", err) end
    }

    # ============================ Cache zone ================================
    proxy_cache_path /var/cache/nginx/edge
        levels=1:2
        keys_zone=edge_cache:200m
        max_size=20g
        inactive=24h
        use_temp_path=off;

    # ============================ Access log JSON ===========================
    log_format json_combined escape=json
      '{'
        '"ts":"$time_iso8601",'
        '"tenant":"$http_x_tenant_id",'
        '"host":"$host",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"req_time":$request_time,'
        '"up_time":"$upstream_response_time",'
        '"cache":"$upstream_cache_status",'
        '"ip":"$remote_addr",'
        '"ua":"$http_user_agent",'
        '"ref":"$http_referer"'
      '}';
    access_log /var/log/nginx/access.json json_combined buffer=64k flush=5s;

    # ============================ SSL defaults ==============================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    # ============================ HTTP → HTTPS ==============================
    server {
        listen 80 default_server;
        location /healthz { return 200 "ok\n"; default_type text/plain; }
        location /       { return 301 https://$host$request_uri; }
    }

    # ============================ HTTPS — Dynamic SSL =======================
    server {
        listen 443 ssl default_server reuseport;
        http2 on;

        # Fallback cert để OpenResty boot được — sẽ bị Lua override theo SNI.
        ssl_certificate     /etc/nginx/ssl/fallback.crt;
        ssl_certificate_key /etc/nginx/ssl/fallback.key;

        ssl_certificate_by_lua_block {
            require("dynamic_ssl").load()
        }

        # WAF + Rate limit ở access phase, BEFORE proxy.
        access_by_lua_block {
            require("waf").run()
            require("rate_limit").run()
        }

        # Cache config
        proxy_cache              edge_cache;
        proxy_cache_key          "$scheme$host$request_uri";
        proxy_cache_lock         on;
        proxy_cache_use_stale    error timeout updating http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_valid        200 301 302 1h;
        proxy_cache_valid        404      1m;
        add_header X-Cache-Status $upstream_cache_status always;

        # Origin lookup từ Redis theo hostname (động).
        set $origin_upstream "";
        rewrite_by_lua_block {
            ngx.var.origin_upstream = require("origin_lookup").resolve()
        }

        location /healthz { return 200 "ok\n"; default_type text/plain; access_log off; }

        location / {
            proxy_pass $origin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 60s;
        }
    }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
